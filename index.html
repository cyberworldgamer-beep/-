<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Танковый бой — мультиплеер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
        }
        .game-container {
            background: #2c3e2f;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 8px;
            box-shadow: 0 0 0 2px #8b5a2b;
            cursor: none;
        }
        .info {
            margin-top: 12px;
            color: #ffd966;
            text-align: center;
            font-size: 14px;
            background: #1e2a1c;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            width: 100%;
        }
        .status {
            color: #ffaa66;
        }
        button {
            background: #5a3e1b;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            margin-left: 10px;
            cursor: pointer;
        }
        button:hover { background: #7a5a2b; }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="info">
            🚀 Управление: стрелки | 🔫 Пробел — стрельба | 🧩 Игроков: <span id="playerCount">0</span>
            <span id="connectionStatus" class="status">🔴 Соединение...</span>
            <button id="resetBtn">↺ Переподключиться</button>
        </div>
    </div>
</div>

<script>
    // ---------- НАСТРОЙКИ ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const WS_URL = 'ws://localhost:8080';

    let socket = null;
    let myPlayerId = null;
    let myTankId = null;

    // Состояние для интерполяции
    let prevSnapshot = null;
    let currentSnapshot = null;
    let prevTimestamp = 0;
    let currentTimestamp = 0;

    let lastRenderTime = 0;
    let animationId = null;

    // Флаги клавиш (чтобы не слать дубликаты)
    const keyState = {
        ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
    };

    // ---------- СОЕДИНЕНИЕ ----------
    function connect() {
        if (socket && socket.readyState === WebSocket.OPEN) socket.close();
        socket = new WebSocket(WS_URL);

        socket.onopen = () => {
            console.log('WebSocket connected');
            document.getElementById('connectionStatus').innerHTML = '🟢 В игре';
            document.getElementById('connectionStatus').style.color = '#aaffaa';
            // Отправить имя (можно изменить)
            socket.send(JSON.stringify({ type: 'join', name: `Танкист_${Math.floor(Math.random()*1000)}` }));
            // Запустить пинг
            startPing();
        };

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'init') {
                myPlayerId = msg.playerId;
                myTankId = msg.tankId;
                console.log('Инициализация: playerId=', myPlayerId, 'tankId=', myTankId);
            }
            else if (msg.type === 'snapshot') {
                // Обновляем снапшоты для интерполяции
                if (currentSnapshot) {
                    prevSnapshot = currentSnapshot;
                    prevTimestamp = currentTimestamp;
                }
                currentSnapshot = msg;
                currentTimestamp = performance.now();
                // Если нет предыдущего, просто копируем текущий
                if (!prevSnapshot) {
                    prevSnapshot = JSON.parse(JSON.stringify(currentSnapshot));
                    prevTimestamp = currentTimestamp - 33; // предполагаемый интервал
                }
                // Обновить счётчик игроков (по количеству танков в снапшоте)
                document.getElementById('playerCount').innerText = currentSnapshot.tanks.length;
            }
            else if (msg.type === 'error') {
                alert('Ошибка: ' + msg.message);
                console.error(msg.message);
            }
        };

        socket.onclose = () => {
            document.getElementById('connectionStatus').innerHTML = '🔴 Отключено';
            document.getElementById('connectionStatus').style.color = '#ffaaaa';
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
        };

        socket.onerror = (err) => {
            console.error('WebSocket error', err);
        };
    }

    function startPing() {
        setInterval(() => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'ping' }));
            }
        }, 1000);
    }

    // ---------- ОТПРАВКА КОМАНД ----------
    function sendKeyEvent(type, key) {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type, key }));
        }
    }

    function sendShoot() {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: 'shoot' }));
        }
    }

    // ---------- ОБРАБОТЧИКИ КЛАВИАТУРЫ ----------
    function handleKeyDown(e) {
        const key = e.key;
        if (key === ' ' || key === 'Space') {
            e.preventDefault();
            sendShoot();
            return;
        }
        if (keyState.hasOwnProperty(key) && !keyState[key]) {
            keyState[key] = true;
            sendKeyEvent('keydown', key);
            e.preventDefault();
        }
    }

    function handleKeyUp(e) {
        const key = e.key;
        if (key === ' ' || key === 'Space') {
            e.preventDefault();
            return;
        }
        if (keyState.hasOwnProperty(key) && keyState[key]) {
            keyState[key] = false;
            sendKeyEvent('keyup', key);
            e.preventDefault();
        }
    }

    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // ---------- ОТРИСОВКА С ИНТЕРПОЛЯЦИЕЙ ----------
    function interpolateTanks() {
        if (!currentSnapshot) return [];

        const now = performance.now();
        let t = 0.5; // по умолчанию
        if (prevSnapshot && currentTimestamp > prevTimestamp) {
            t = (now - prevTimestamp) / (currentTimestamp - prevTimestamp);
            t = Math.min(1, Math.max(0, t));
        }

        // Создаём карту танков из prev и current по id
        const prevTanksMap = new Map();
        const currTanksMap = new Map();
        if (prevSnapshot) {
            prevSnapshot.tanks.forEach(t => prevTanksMap.set(t.id, t));
        }
        currentSnapshot.tanks.forEach(t => currTanksMap.set(t.id, t));

        const interpolated = [];

        // Интерполируем существующие в обоих снапшотах
        for (let [id, currT] of currTanksMap.entries()) {
            const prevT = prevTanksMap.get(id);
            if (prevT) {
                const x = prevT.x + (currT.x - prevT.x) * t;
                const y = prevT.y + (currT.y - prevT.y) * t;
                // Угол интерполируем с учётом перехода через 360
                let angle = prevT.angle;
                let deltaAngle = currT.angle - prevT.angle;
                if (deltaAngle > 180) deltaAngle -= 360;
                if (deltaAngle < -180) deltaAngle += 360;
                angle += deltaAngle * t;
                interpolated.push({
                    id: currT.id,
                    x, y,
                    angle: angle,
                    health: currT.health,
                    name: currT.name
                });
            } else {
                // новый танк
                interpolated.push({ ...currT });
            }
        }
        return interpolated;
    }

    function draw() {
        if (!currentSnapshot) {
            // рисуем пустое поле
            ctx.fillStyle = '#3a5a3a';
            ctx.fillRect(0, 0, 800, 600);
            ctx.fillStyle = 'white';
            ctx.font = '20px monospace';
            ctx.fillText('Ожидание подключения...', 300, 300);
            return;
        }

        // Интерполированные танки
        const tanksToDraw = interpolateTanks();

        // Фон
        ctx.fillStyle = '#3a5a3a';
        ctx.fillRect(0, 0, 800, 600);

        // Стена
        ctx.fillStyle = '#8b5a2b';
        ctx.fillRect(350, 250, 100, 100);
        ctx.fillStyle = '#b87c3a';
        ctx.fillRect(352, 252, 96, 96);

        // Пули (без интерполяции, рисуем как есть)
        for (let b of currentSnapshot.bullets) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
            ctx.fillStyle = '#ffaa44';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Танки
        for (let tank of tanksToDraw) {
            const x = tank.x;
            const y = tank.y;
            const angle = tank.angle * Math.PI / 180;
            const halfSize = 20;

            // Корпус (квадрат)
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = (tank.id === myTankId) ? '#7ec850' : '#5a9e4e';
            ctx.fillRect(-halfSize, -halfSize, 40, 40);
            ctx.strokeStyle = '#2c2c2c';
            ctx.lineWidth = 2;
            ctx.strokeRect(-halfSize, -halfSize, 40, 40);

            // Башня (прямоугольник)
            ctx.fillStyle = '#c9a87b';
            ctx.fillRect(-12, -12, 24, 24);
            ctx.fillStyle = '#8b6946';
            ctx.fillRect(-6, -6, 12, 12);

            // Дуло
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(32, 0);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#4a3a2a';
            ctx.stroke();
            ctx.restore();

            // Полоска здоровья
            const healthPercent = tank.health / 3;
            ctx.fillStyle = '#aa3333';
            ctx.fillRect(x - 20, y - 28, 40, 6);
            ctx.fillStyle = '#33aa33';
            ctx.fillRect(x - 20, y - 28, 40 * healthPercent, 6);

            // Имя игрока
            ctx.font = 'bold 14px "Segoe UI", monospace';
            ctx.fillStyle = '#ffecb3';
            ctx.shadowBlur = 2;
            ctx.shadowColor = 'black';
            ctx.fillText(tank.name, x - 25, y - 32);
            ctx.shadowBlur = 0;
        }

        // Отображение текущего FPS и статуса
        ctx.font = '12px monospace';
        ctx.fillStyle = '#ccccaa';
        ctx.fillText('WebSocket мультиплеер | Танковый бой', 10, 20);
        if (myTankId) {
            const myTank = tanksToDraw.find(t => t.id === myTankId);
            if (myTank) ctx.fillText(`Ваше здоровье: ${myTank.health}`, 10, 40);
        }
    }

    function animate() {
        draw();
        animationId = requestAnimationFrame(animate);
    }

    // ---------- ПЕРЕПОДКЛЮЧЕНИЕ ----------
    document.getElementById('resetBtn').addEventListener('click', () => {
        if (socket) socket.close();
        setTimeout(() => connect(), 100);
    });

    // ---------- СТАРТ ----------
    connect();
    animate();

    // Блокировка контекстного меню на canvas
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
</script>
</body>
</html>
